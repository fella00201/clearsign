name: AI Agent System

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]

jobs:
  # ── Runs when a new Issue is opened ──────────────────────
  orchestrate:
    name: Orchestrator — plan and route
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run orchestrator on issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          claude --system-prompt "$(cat agents/orchestrator.md)" \
            --print \
            "New GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Read the codebase, make a plan, implement the changes, then open a pull request. 
          Reference issue #${ISSUE_NUMBER} in the PR." \
            > agent-output.txt 2>&1

          cat agent-output.txt

  # ── Runs on every PR — security audit ────────────────────
  security-review:
    name: Security agent — audit PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: git diff origin/main...HEAD > pr-diff.txt

      - name: Run security agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --system-prompt "$(cat agents/security-agent.md)" \
            --print \
            "Review this pull request diff for security issues:

          $(cat pr-diff.txt)

          List all security issues found with severity ratings.
          If no issues found, say VERDICT: approve" \
            > security-output.txt 2>&1

          cat security-output.txt

      - name: Post security review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.readFileSync('security-output.txt', 'utf8')
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🔒 Security Agent Review\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\``
            })

  # ── Runs on every PR — code review ───────────────────────
  code-review:
    name: Review agent — code quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        run: git diff origin/main...HEAD > pr-diff.txt

      - name: Run review agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --system-prompt "$(cat agents/review-agent.md)" \
            --print \
            "Review this pull request for code quality, performance and accessibility:

          $(cat pr-diff.txt)" \
            > review-output.txt 2>&1

          cat review-output.txt

      - name: Post code review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.readFileSync('review-output.txt', 'utf8')
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🔍 Review Agent\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\``
            })
